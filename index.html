<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Vikalp.ai — भारत का अपना AI</title>
<meta name="description" content="Vikalp.ai — Bharat ka apna AI. Real AI-powered chat, Kundali readings, Indian languages, news and more."/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#07070f;--bg2:#0c0c17;--bg3:#10101e;--bg4:#141428;
  --card:#16162b;--card2:#1a1a30;--card3:#1e1e36;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);--border3:rgba(255,255,255,0.18);
  --accent:#6366f1;--accent2:#818cf8;--accent3:#a5b4fc;--accentD:#4f52c9;
  --saffron:#f97316;--saffron2:#fb923c;--gold:#fbbf24;--goldD:#d97706;
  --green:#22c55e;--red:#ef4444;--pink:#ec4899;--cyan:#06b6d4;--teal:#14b8a6;
  --white:#f8fafc;--white80:rgba(248,250,252,0.80);--white60:rgba(248,250,252,0.60);
  --white40:rgba(248,250,252,0.40);--white20:rgba(248,250,252,0.15);--white06:rgba(248,250,252,0.04);
  --muted:#64748b;--muted2:#475569;
  --glow:rgba(99,102,241,0.35);--glow-o:rgba(249,115,22,0.3);--glow-g:rgba(251,191,36,0.2);
  --r-sm:10px;--r-md:14px;--r-lg:18px;--r-xl:22px;
  --shadow:0 4px 24px rgba(0,0,0,0.5);--shadow-lg:0 8px 48px rgba(0,0,0,0.7);
  --transition:all 0.18s cubic-bezier(.4,0,.2,1);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--white);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
button,input,textarea,select{font-family:inherit;}
:focus-visible{outline:2px solid var(--accent3);outline-offset:2px;}
::selection{background:rgba(99,102,241,0.3);}

/* ══ AMBIENT ══ */
.amb{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.amb-orb{position:absolute;border-radius:50%;filter:blur(120px);}
.a1{width:900px;height:900px;background:radial-gradient(circle,#6366f1,transparent 65%);opacity:0.055;top:-350px;right:-200px;animation:drift1 20s ease-in-out infinite;}
.a2{width:700px;height:700px;background:radial-gradient(circle,#f97316,transparent 65%);opacity:0.04;bottom:-200px;left:-150px;animation:drift2 25s ease-in-out infinite;}
.a3{width:500px;height:500px;background:radial-gradient(circle,#fbbf24,transparent 65%);opacity:0.025;top:35%;left:30%;animation:drift3 18s ease-in-out infinite;}
@keyframes drift1{0%,100%{transform:translate(0,0)}50%{transform:translate(-60px,40px)}}
@keyframes drift2{0%,100%{transform:translate(0,0)}50%{transform:translate(80px,-50px)}}
@keyframes drift3{0%,100%{transform:translate(0,0)}50%{transform:translate(-30px,60px)}}

/* ══ TOPBAR ══ */
.topbar{height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:rgba(7,7,15,0.9);backdrop-filter:blur(48px) saturate(180%);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none;cursor:pointer;background:none;border:none;padding:0;}
.brand-ico{width:36px;height:36px;border-radius:11px;background:linear-gradient(135deg,var(--accent),var(--saffron));display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 20px var(--glow);flex-shrink:0;position:relative;}
.brand-ico::after{content:'';position:absolute;inset:-1px;border-radius:12px;background:linear-gradient(135deg,rgba(255,255,255,0.2),transparent);pointer-events:none;}
.brand-text{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;letter-spacing:-0.03em;color:var(--white);}
.brand-text span{color:var(--saffron2);}
.topbar-r{display:flex;align-items:center;gap:8px;}
.live-badge{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:999px;background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.2);font-size:10px;font-weight:700;color:var(--green);letter-spacing:0.06em;}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:ldot 1.8s infinite;}
@keyframes ldot{0%,100%{opacity:1}50%{opacity:0.15}}
.menu-btn{width:38px;height:38px;border-radius:10px;border:1px solid var(--border2);background:var(--white06);color:var(--white60);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--transition);}
.menu-btn:hover{background:var(--white20);color:var(--white);border-color:var(--border3);}

/* ══ LAYOUT ══ */
#app{display:flex;flex-direction:column;min-height:100vh;}
.layout{display:flex;flex:1;position:relative;z-index:1;}

/* ══ SIDEBAR ══ */
.sidebar{width:228px;background:rgba(7,7,15,0.95);border-right:1px solid var(--border);padding:12px 10px 16px;display:flex;flex-direction:column;gap:2px;position:sticky;top:58px;height:calc(100vh - 58px);overflow-y:auto;flex-shrink:0;transition:transform 0.22s cubic-bezier(.4,0,.2,1);}
.sidebar::-webkit-scrollbar{width:0;}
.sb-sec{font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted2);padding:12px 10px 4px;}
.sb-btn{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:10px;cursor:pointer;font-size:12.5px;font-weight:500;color:var(--white40);transition:var(--transition);border:1px solid transparent;background:none;width:100%;text-align:left;}
.sb-btn:hover{background:var(--white20);color:var(--white);}
.sb-btn.on{background:rgba(99,102,241,0.14);color:var(--accent3);border-color:rgba(99,102,241,0.22);}
.sb-btn .si{font-size:15px;width:20px;text-align:center;flex-shrink:0;}
.sb-div{height:1px;background:var(--border);margin:8px 10px;}
.per-btn{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:10px;cursor:pointer;font-size:11.5px;font-weight:500;color:var(--white40);transition:var(--transition);border:1px solid transparent;background:none;width:100%;text-align:left;}
.per-btn:hover{background:var(--white20);color:var(--white);}
.per-btn.on{background:rgba(236,72,153,0.1);color:#f9a8d4;border-color:rgba(236,72,153,0.22);}
.per-avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.lang-box,.model-sel{padding:10px;background:var(--card);border-radius:13px;border:1px solid var(--border);margin:4px 0;}
.lang-box-label,.model-label{font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;display:block;}
.lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px;}
.lc{padding:5px 6px;border-radius:7px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--white06);color:var(--white40);text-align:center;transition:var(--transition);}
.lc:hover,.lc.on{background:rgba(99,102,241,0.14);border-color:rgba(99,102,241,0.3);color:var(--accent3);}
.model-sel select{width:100%;padding:7px 10px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--white);font-size:11px;outline:none;cursor:pointer;}
.model-sel select option{background:var(--bg2);}

/* Market ticker */
.ticker-box{margin-top:auto;padding:10px;background:var(--card);border-radius:13px;border:1px solid var(--border);}
.ticker-label{font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;display:flex;align-items:center;gap:5px;}
.trow{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--border);}
.trow:last-child{border:none;}
.tn{color:var(--white40);font-size:10px;}
.tv{font-family:'Space Mono',monospace;font-weight:700;font-size:10px;}
.tv.up{color:var(--green);}
.tv.dn{color:var(--red);}
.sidebar-backdrop{display:none;}

/* ══ CONTENT ══ */
.content{flex:1;display:flex;flex-direction:column;min-width:0;}
.panel{display:none;flex:1;flex-direction:column;}
.panel.on{display:flex;}

/* ══ CHAT ══ */
.chat-outer{flex:1;display:flex;flex-direction:column;max-width:840px;width:100%;margin:0 auto;padding:0 16px;}

/* Welcome */
.welcome{padding:36px 0 20px;text-align:center;}
.w-icon{width:76px;height:76px;border-radius:24px;margin:0 auto 16px;background:linear-gradient(135deg,var(--accent),var(--saffron),var(--gold));display:flex;align-items:center;justify-content:center;font-size:34px;box-shadow:0 0 60px var(--glow),0 0 120px rgba(249,115,22,0.15);position:relative;}
.w-icon::after{content:'';position:absolute;inset:-1px;border-radius:25px;background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent);pointer-events:none;}
.w-title{font-family:'Space Grotesk',sans-serif;font-size:clamp(32px,7vw,54px);font-weight:900;letter-spacing:-0.045em;margin-bottom:8px;
  background:linear-gradient(135deg,var(--white) 0%,var(--accent3) 35%,var(--saffron2) 65%,var(--gold) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.05;}
.w-sub{color:var(--white40);font-size:13.5px;max-width:460px;margin:0 auto 20px;line-height:1.75;font-family:'Noto Sans Devanagari',sans-serif;}
.cur-persona{display:inline-flex;align-items:center;gap:8px;padding:7px 16px;border-radius:999px;background:var(--card);border:1px solid var(--border2);margin-bottom:22px;font-size:12px;font-weight:600;}
.s-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:20px;}
.sc{padding:13px 15px;border-radius:14px;background:var(--card2);border:1px solid var(--border);cursor:pointer;transition:var(--transition);display:flex;gap:10px;align-items:flex-start;text-align:left;}
.sc:hover{border-color:rgba(99,102,241,0.4);background:var(--card3);transform:translateY(-2px);box-shadow:var(--shadow);}
.sc:active{transform:translateY(0);}
.sc-em{font-size:20px;flex-shrink:0;margin-top:1px;}
.sc-title{font-size:12px;font-weight:700;color:var(--white);margin-bottom:2px;}
.sc-desc{font-size:10.5px;color:var(--white40);line-height:1.45;}

/* Messages */
.msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:16px;padding:16px 0 10px;}
.msgs::-webkit-scrollbar{width:3px;}
.msgs::-webkit-scrollbar-thumb{background:var(--card3);border-radius:2px;}
.msg{display:flex;gap:10px;animation:msgIn 0.25s cubic-bezier(.4,0,.2,1);}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse;}
.av{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;}
.msg.ai .av{background:linear-gradient(135deg,var(--accent),var(--saffron));box-shadow:0 0 12px var(--glow);}
.msg.user .av{background:linear-gradient(135deg,#1a1a40,#2d1b69);border:1px solid rgba(99,102,241,0.3);}
.mbody{max-width:80%;display:flex;flex-direction:column;gap:4px;}
.msg.user .mbody{align-items:flex-end;}
.bbl{padding:12px 16px;border-radius:18px;font-size:14px;line-height:1.75;}
.msg.user .bbl{background:linear-gradient(135deg,#1a1a40,#141430);border:1px solid rgba(99,102,241,0.22);border-radius:18px 18px 4px 18px;}
.msg.ai .bbl{background:var(--card3);border:1px solid var(--border);border-radius:18px 18px 18px 4px;}
.mmeta{font-size:10px;color:var(--muted);padding:0 3px;}
.ai-tag{display:inline-flex;align-items:center;gap:5px;margin-bottom:5px;align-self:flex-start;padding:3px 9px;border-radius:999px;font-size:9px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.22);color:var(--accent3);}

/* Thinking */
.think-bbl{display:flex;gap:6px;padding:14px 18px;background:var(--card3);border:1px solid var(--border);border-radius:18px 18px 18px 4px;align-items:center;}
.think-bbl span{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:th 1.3s infinite;}
.think-bbl span:nth-child(2){animation-delay:.2s;background:var(--saffron);}
.think-bbl span:nth-child(3){animation-delay:.4s;background:var(--gold);}
@keyframes th{0%,60%,100%{transform:translateY(0);opacity:0.4}30%{transform:translateY(-8px);opacity:1}}

/* Markdown */
.bbl strong{color:var(--saffron2);}
.bbl em{color:var(--white60);}
.bbl code{background:rgba(255,255,255,0.07);padding:2px 6px;border-radius:5px;font-family:'Space Mono',monospace;font-size:12px;color:var(--gold);}
.bbl pre{background:#050510;border:1px solid var(--border2);border-radius:12px;padding:14px;margin:10px 0;overflow-x:auto;}
.bbl pre code{background:none;padding:0;color:#a5b4fc;font-size:12px;line-height:1.65;}
.bbl ul,.bbl ol{padding-left:20px;margin:6px 0;}
.bbl li{margin-bottom:5px;color:var(--white80);}
.bbl h2{color:var(--accent3);font-size:16px;font-weight:700;margin:14px 0 6px;border-bottom:1px solid var(--border);padding-bottom:5px;}
.bbl h3{color:var(--saffron2);font-size:14px;font-weight:700;margin:10px 0 4px;}
.bbl blockquote{border-left:3px solid var(--accent);padding:8px 14px;background:rgba(99,102,241,0.07);border-radius:0 8px 8px 0;margin:8px 0;color:var(--white60);font-style:italic;}
.bbl table{width:100%;border-collapse:collapse;margin:10px 0;font-size:12px;}
.bbl th{background:rgba(99,102,241,0.15);padding:7px 10px;text-align:left;font-weight:700;border:1px solid var(--border2);}
.bbl td{padding:6px 10px;border:1px solid var(--border);}
.bbl tr:nth-child(even) td{background:rgba(255,255,255,0.02);}
.bbl a{color:var(--accent3);text-decoration:underline;text-underline-offset:2px;}
.bbl hr{border:none;border-top:1px solid var(--border);margin:12px 0;}

/* Image in chat */
.chat-img{max-width:100%;max-height:260px;border-radius:12px;border:1px solid var(--border2);margin-top:8px;display:block;}
.img-preview-wrap{position:relative;display:inline-block;margin-bottom:8px;}
.img-preview-wrap img{max-width:100px;max-height:100px;border-radius:10px;border:1px solid var(--border2);display:block;}
.img-preview-wrap button{position:absolute;top:-5px;right:-5px;width:18px;height:18px;border-radius:50%;background:var(--red);border:none;color:white;font-size:10px;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center;}

/* ══ INPUT AREA ══ */
.input-area{padding:8px 0 16px;position:sticky;bottom:0;background:linear-gradient(to top,var(--bg) 70%,transparent);}
.mode-row{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap;}
.mc{padding:4px 12px;border-radius:999px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--white06);color:var(--muted);transition:var(--transition);}
.mc:hover,.mc.on{background:rgba(99,102,241,0.12);border-color:rgba(99,102,241,0.32);color:var(--accent3);}
.ibox{display:flex;align-items:flex-end;gap:8px;background:var(--card2);border:1.5px solid var(--border2);border-radius:20px;padding:10px 10px 10px 16px;transition:var(--transition);}
.ibox:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,0.14);}
#inp{flex:1;background:none;border:none;outline:none;color:var(--white);font-size:14px;resize:none;max-height:160px;line-height:1.65;font-family:'Inter',sans-serif;}
#inp::placeholder{color:var(--muted);}
.ibtns{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.ibtn{width:33px;height:33px;border-radius:9px;border:none;background:var(--white06);color:var(--muted);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:var(--transition);}
.ibtn:hover{background:rgba(99,102,241,0.15);color:var(--accent3);}
.ibtn.rec{background:rgba(239,68,68,0.15);color:var(--red);animation:pulse-rec 1s infinite;}
@keyframes pulse-rec{0%,100%{opacity:1}50%{opacity:0.4}}
.send-btn{width:40px;height:40px;border-radius:13px;border:none;background:linear-gradient(135deg,var(--accent),var(--saffron));color:var(--white);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px var(--glow);transition:var(--transition);flex-shrink:0;}
.send-btn:hover:not(:disabled){transform:scale(1.06);box-shadow:0 6px 24px var(--glow);}
.send-btn:active:not(:disabled){transform:scale(0.97);}
.send-btn:disabled{opacity:0.3;cursor:not-allowed;}
.ifooter{display:flex;justify-content:space-between;margin-top:6px;padding:0 3px;}
.ifl{font-size:10px;color:var(--muted);}
.ifl span{color:var(--muted2);}
#fileInp{display:none;}

/* ══ PANEL SHARED ══ */
.panel-wrap{max-width:740px;width:100%;margin:0 auto;padding:28px 16px 48px;flex:1;}
.ph{margin-bottom:28px;}
.ph-eyebrow{font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--saffron2);margin-bottom:10px;}
.ph-title{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:800;letter-spacing:-0.03em;margin-bottom:6px;background:linear-gradient(135deg,var(--white),var(--white60));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.ph-sub{color:var(--white40);font-size:13px;line-height:1.7;}

/* ══ KUNDALI ══ */
.k-steps{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;}
.k-step{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--muted);}
.k-step.done{color:var(--accent3);}
.k-step.cur{color:var(--white);}
.k-dot{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.k-step.done .k-dot{background:var(--accent);border-color:var(--accent);color:white;}
.k-step.cur .k-dot{background:rgba(99,102,241,0.2);border-color:var(--accent3);color:var(--accent3);}
.k-line{width:28px;height:1px;background:var(--border);}

.form-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.form-field{display:flex;flex-direction:column;gap:5px;}
.form-field.full{grid-column:1/-1;}
.form-field label{font-size:11px;font-weight:600;color:var(--white40);}
.form-field input,.form-field select{padding:10px 13px;background:var(--bg3);border:1px solid var(--border2);border-radius:9px;color:var(--white);font-size:13px;outline:none;transition:var(--transition);}
.form-field input:focus,.form-field select:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(99,102,241,0.15);}
.form-field input::placeholder{color:var(--muted);}
.form-field select option{background:var(--bg2);}
.submit-btn{width:100%;padding:13px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--accent),var(--saffron));color:white;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px;transition:var(--transition);box-shadow:0 4px 18px var(--glow);}
.submit-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 24px var(--glow);}
.submit-btn:disabled{opacity:0.4;cursor:not-allowed;}
.result-area{animation:fadeUp 0.3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.k-result-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
.k-result-header{padding:18px 22px;background:linear-gradient(135deg,rgba(99,102,241,0.15),rgba(249,115,22,0.1));border-bottom:1px solid var(--border);}
.k-result-title{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;margin-bottom:3px;}
.k-result-sub{font-size:12px;color:var(--white40);}
.k-result-body{padding:22px;font-size:14px;line-height:1.85;white-space:pre-wrap;color:var(--white80);}
.k-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px;}
.k-chip{padding:4px 12px;border-radius:999px;font-size:11px;font-weight:600;background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.25);color:var(--accent3);}
